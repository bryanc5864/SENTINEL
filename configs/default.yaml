# SENTINEL v2 Default Configuration

# ============================================================
# Data
# ============================================================
data:
  root_dir: "data/"

  satellite:
    tile_size: 512
    tile_resolution: 10           # meters
    bands: ["B2","B3","B4","B5","B6","B7","B8","B8A","B11","B12"]
    num_bands_s2: 10
    s3_bands: ["Oa01","Oa02","Oa03","Oa04","Oa05","Oa06","Oa07","Oa08","Oa09","Oa10",
               "Oa11","Oa12","Oa13","Oa14","Oa15","Oa16","Oa17","Oa18","Oa19","Oa20","Oa21"]
    num_bands_s3: 21
    temporal_buffer: 10
    cloud_threshold: 20

  sensor:
    parameters: ["00300","00400","00095","00010","63680","00090"]
    parameter_names: ["DO","pH","SpCond","Temp","Turb","ORP"]
    num_parameters: 6
    lookback_window: 672          # 7 days at 15-min intervals
    normalization: "z-score"      # rolling 90-day per-station

  microbial:
    min_abundance: 0.001
    pseudocount: 0.5
    max_features: 5000

  molecular:
    num_pathways: 7
    pathway_names:
      - "AHR/CYP1A"
      - "Metallothionein"
      - "Estrogen/Endocrine"
      - "Cholinesterase"
      - "Oxidative Stress"
      - "Heat Shock"
      - "DNA Damage"
    num_genes: 200

  ecotox:
    endpoint_types: ["LC50","EC50","NOEC","LOEC"]
    exposure_medium: "freshwater"
    min_species_count: 5

  behavioral:
    organisms: ["daphnia", "mussel", "fish"]
    keypoints:
      daphnia: 12
      mussel: 8
      fish: 22
    raw_fps: 30
    target_fps: 1
    max_trajectory_length: 1800   # 30 minutes at 1Hz

  sentinel_db:
    h3_resolution: 8
    temporal_window_hours: 3
    spatial_tolerance_m: 500

# ============================================================
# Models
# ============================================================
models:
  shared_embedding_dim: 256

  sensor:
    architecture: "aqua_ssm"
    ssm_dim: 256
    num_scales: 8
    scale_range: [3600, 31536000]  # 1h to 1yr in seconds
    physics_constraint_weight: 0.1
    mpp_mask_ratio: [0.25, 0.75]
    num_parameters: 6

  satellite:
    architecture: "hydrovit"
    backbone: "vit_small_patch16_224"
    embed_dim: 384
    num_bands_s2: 10
    num_bands_s3: 21
    num_output_params: 16
    mae_mask_ratio: 0.75
    physics_loss_weight: 0.1
    temporal_stack_size: 10

  microbial:
    architecture: "microbiomenet"
    embed_dim: 256
    num_heads: 4
    num_layers: 4
    ff_dim: 512
    dropout: 0.1
    num_sources: 8
    dnabert_model: "zhihan1996/DNABERT-S"
    simplex_ode_latent_dim: 32

  molecular:
    architecture: "toxigene"
    hierarchy_layers: 3
    bottleneck_l1_range: [0.0, 0.1]
    target_genes: [20, 50]
    cross_species: true

  behavioral:
    architecture: "biomotion"
    pose_embed_dim: 128
    trajectory_embed_dim: 256
    diffusion_noise_schedule: "cosine"
    num_denoise_steps: 20
    organisms: ["daphnia", "mussel", "fish"]

  digital_biosentinel:
    chemical_embed_dim: 128
    species_embed_dim: 64
    hidden_dims: [512, 256, 128]
    mc_dropout_passes: 20
    dropout: 0.3

  fusion:
    architecture: "perceiver_io"
    num_latents: 256
    latent_dim: 256
    num_heads: 8
    num_self_attention_layers: 4
    modalities: ["satellite", "sensor", "microbial", "molecular", "behavioral"]
    decay_init:
      satellite: 432000          # ~5 days
      sensor: 7200               # ~2 hours
      microbial: 604800          # ~7 days
      molecular: 259200          # ~3 days
      behavioral: 300            # ~5 minutes — fastest response

  escalation:
    num_modalities: 5
    num_tiers: 4
    state_dim: 267
    tiers:
      0:
        modalities: ["sensor", "behavioral"]
        cost: "low"
      1:
        modalities: ["sensor", "behavioral", "satellite"]
        cost: "medium"
      2:
        modalities: ["sensor", "behavioral", "satellite", "microbial"]
        cost: "medium-high"
      3:
        modalities: ["sensor", "behavioral", "satellite", "microbial", "molecular"]
        cost: "high"
    gamma: 0.99
    lr: 3.0e-4
    rewards:
      detect: 10.0
      early_bonus_per_hour: 0.5
      false_alarm: -5.0
      compute_cost_per_tier: -0.1
      miss_penalty: -50.0

# ============================================================
# Training
# ============================================================
training:
  sensor:
    pretraining:
      lr: 5.0e-4
      batch_size: 256
      epochs: 100
      warmup_steps: 5000
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"
      mpp_mask_ratio: [0.25, 0.75]
    finetuning:
      lr: 1.0e-4
      batch_size: 128
      epochs: 50
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"

  satellite:
    mae_pretraining:
      lr: 1.5e-4
      batch_size: 32
      epochs: 100
      optimizer: "adamw"
      weight_decay: 0.05
      scheduler: "cosine"
      warmup_epochs: 10
      mae_mask_ratio: 0.75
    finetuning:
      lr: 1.0e-4
      batch_size: 32
      epochs: 50
      optimizer: "adamw"
      weight_decay: 0.05
      scheduler: "cosine"

  microbial:
    source_attribution:
      lr: 1.0e-3
      batch_size: 64
      epochs: 200
      cross_val_folds: 5
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"
    simplex_ode:
      lr: 1.0e-3
      batch_size: 32
      epochs: 300
      optimizer: "adamw"
      weight_decay: 0.01

  molecular:
    toxigene:
      lr: 1.0e-3
      batch_size: 64
      epochs: 100
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"
    bottleneck:
      lr: 1.0e-3
      batch_size: 64
      epochs: 50
      l1_lambda_range: [0.0, 0.1]

  behavioral:
    pose_estimator:
      lr: 1.0e-4
      batch_size: 16
      epochs: 80
      optimizer: "adamw"
      weight_decay: 0.05
      scheduler: "cosine"
    diffusion_pretraining:
      lr: 2.0e-4
      batch_size: 64
      epochs: 200
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"
      warmup_steps: 2000
      num_denoise_steps: 20
    finetuning:
      lr: 5.0e-5
      batch_size: 32
      epochs: 50
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"

  biosentinel:
    lr: 1.0e-3
    batch_size: 512
    epochs: 100
    oversample_rare: true
    optimizer: "adamw"
    weight_decay: 0.01

  fusion:
    stage1:
      lr: 1.0e-4
      batch_size: 32
      epochs: 50
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"
      warmup_steps: 1000
    stage2:
      lr: 1.0e-5
      batch_size: 16
      epochs: 30
      optimizer: "adamw"
      weight_decay: 0.01
      scheduler: "cosine"

  escalation:
    algorithm: "PPO"
    total_timesteps: 500000
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    gae_lambda: 0.95
    curriculum:
      phase1:
        name: "easy_events"
        difficulty: [0.0, 0.3]
        event_ratio: 0.7
        timesteps_fraction: 0.3
      phase2:
        name: "mixed_difficulty"
        difficulty: [0.2, 0.7]
        event_ratio: 0.5
        timesteps_fraction: 0.4
      phase3:
        name: "hard_events"
        difficulty: [0.5, 1.0]
        event_ratio: 0.5
        timesteps_fraction: 0.3

# ============================================================
# Evaluation
# ============================================================
evaluation:
  ablation_conditions: 31         # 2^5 - 1 non-empty modality subsets
  ablation_named:
    - "sensor_only"
    - "behavioral_only"
    - "satellite_only"
    - "microbial_only"
    - "molecular_only"
    - "sensor_behavioral"
    - "sensor_satellite"
    - "sensor_behavioral_satellite"
    - "sensor_behavioral_satellite_microbial"
    - "full_fusion"
    - "full_no_decay"
    - "full_sync_only"
    - "full_no_missing_tokens"
    - "full_random_escalation"
    - "full_always_tier3"
  metrics:
    - "detection_auc"
    - "mean_lead_time_hours"
    - "source_attribution_top1"
    - "source_attribution_top3"
    - "false_positive_rate"
    - "impact_calibration_error"
    - "fusion_improvement"
    - "cost_efficiency"
    - "behavioral_anomaly_auc"
    - "cross_species_transfer_r2"
  case_studies:
    - name: "Lake Erie HAB"
      years: [2018, 2019, 2020, 2021, 2022, 2023]
      location: [-83.5, 41.5, -82.8, 41.8]
      contaminant: "nutrient/agricultural"
    - name: "East Palestine Derailment"
      year: 2023
      location: [-80.55, 40.82, -80.48, 40.87]
      contaminant: "industrial_chemical"
    - name: "Chesapeake Bay Blooms"
      years: [2019, 2020, 2021, 2022, 2023]
      location: [-76.5, 36.8, -75.8, 39.5]
      contaminant: "nutrient/agricultural"
